<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>盆踊りフォトフレーム</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    video, canvas { max-width: 100%; height: auto; }
    button {
      margin: 16px;
      padding: 25px 40px;
      font-size: 30px;
      border-radius: 12px;
    }
    #framePreview {
      width: 200px;
      margin-top: 20px;
      border: 2px solid #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>盆踊りフォトフレーム</h1>

  <!-- ★ カメラ映像＋ライブフレーム -->
  <div id="cameraWrap" style="position: relative; display: inline-block;">
    <video id="video" autoplay playsinline style="position: relative; z-index: 1;"></video>

    <!-- カメラ映像に重ねるフレーム -->
    <img id="liveFrame" src="frame1.png"
         style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                z-index: 2; pointer-events:none;">
  </div>

  <br>
  <button id="shootBtn">写真を撮る</button>
  <button id="switchBtn">カメラ切り替え</button>

  <canvas id="canvas"></canvas><br>

  <button id="saveBtn">合成画像を保存</button>

  <!-- 小さいプレビュー -->
  <div>
    <img id="framePreview" src="frame1.png">
  </div>

  <!-- フレーム選択 -->
  <div>
    <button class="frameBtn" data-src="frame1.png">フレーム1</button>
    <button class="frameBtn" data-src="frame3.png">フレーム2</button>
  </div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const shootBtn = document.getElementById('shootBtn');
  const saveBtn = document.getElementById('saveBtn');

  let frameImg = null; // 撮影用フレーム

  // ★ フレーム読み込み関数（撮影用＋ライブプレビュー両方更新）
  function loadFrame(src) {
    shootBtn.disabled = true;

    const img = new Image();
    img.onload = () => {
      frameImg = img;  // 撮影用フレーム更新
      document.getElementById("liveFrame").src = src;  // ライブプレビュー更新
      shootBtn.disabled = false;
    };

    img.src = src + "?v=" + Date.now(); // キャッシュ防止
  }

  // 初期フレーム読み込み
  loadFrame("frame1.png");

  // フレーム切り替え
  document.querySelectorAll('.frameBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const src = btn.getAttribute('data-src');

      document.getElementById("framePreview").src = src; // 小さいプレビュー更新
      loadFrame(src); // 撮影用＋ライブプレビュー更新
    });
  });

  // カメラ起動
  let currentFacing = "environment";

  function startCamera() {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing }
    })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(err => {
      alert("カメラを起動できません: " + err);
    });
  }

  startCamera();

  // カメラ切り替え
  document.getElementById("switchBtn").addEventListener("click", () => {
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    startCamera();
  });

  // 撮影処理
  shootBtn.addEventListener('click', () => {
    const fw = frameImg.width;
    const fh = frameImg.height;

    canvas.width = fw;
    canvas.height = fh;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const videoRatio = vw / vh;
    const frameRatio = fw / fh;

    let drawW, drawH;

    if (videoRatio > frameRatio) {
      drawH = fh;
      drawW = fh * videoRatio;
    } else {
      drawW = fw;
      drawH = fw / videoRatio;
    }

    const x = (fw - drawW) / 2;
    const y = (fh - drawH) / 2;

    ctx.drawImage(video, x, y, drawW, drawH);
    ctx.drawImage(frameImg, 0, 0, fw, fh);
  });

  // 保存
  saveBtn.addEventListener('click', () => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bonodori_frame.png';
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
</script>

</body>
</html>
