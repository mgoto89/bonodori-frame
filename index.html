<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>盆踊りフォトフレーム</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    video, canvas { max-width: 100%; height: auto; }
    button {
      margin: 16px;
      padding: 25px 40px;
      font-size: 30px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>盆踊りフォトフレーム</h1>

  <video id="video" autoplay playsinline></video><br>
  <button id="shootBtn">写真を撮る</button>
  <button id="switchBtn">カメラ切り替え</button>

  <canvas id="canvas"></canvas><br>

  <button id="saveBtn">合成画像を保存</button>

  <div>
    <button class="frameBtn" data-src="frame1.png">フレーム1</button>
    <button class="frameBtn" data-src="frame3.png">フレーム2</button>
  </div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const shootBtn = document.getElementById('shootBtn');
  const saveBtn = document.getElementById('saveBtn');

  // 現在のフレーム画像
  let frameImg = null;

  // 初期フレーム読み込み
  loadFrame("frame1.png");

  function loadFrame(src) {
    shootBtn.disabled = true;  // 読み込み前は無効化

    const img = new Image();   // ← 新しい Image を毎回生成（Safari対策）
    img.onload = () => {
      frameImg = img;
      console.log("フレーム読み込み完了:", src);
      shootBtn.disabled = false;
    };

    img.src = src + "?v=" + Date.now();  
    // ↑ キャッシュ防止のため毎回違うURLにする
  }

  // フレーム切り替え
  document.querySelectorAll('.frameBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const src = btn.getAttribute('data-src');
      loadFrame(src);
    });
  });

  // カメラ起動
  let currentFacing = "environment";

  function startCamera() {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing }
    })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(err => {
      alert("カメラを起動できません: " + err);
    });
  }

  startCamera();

  // カメラ切り替え
  document.getElementById("switchBtn").addEventListener("click", () => {
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    startCamera();
  });

  // 撮影処理
  shootBtn.addEventListener('click', () => {
    const fw = frameImg.width;
    const fh = frameImg.height;

    canvas.width = fw;
    canvas.height = fh;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const videoRatio = vw / vh;
    const frameRatio = fw / fh;

    let drawW, drawH;

    if (videoRatio > frameRatio) {
      drawH = fh;
      drawW = fh * videoRatio;
    } else {
      drawW = fw;
      drawH = fw / videoRatio;
    }

    const x = (fw - drawW) / 2;
    const y = (fh - drawH) / 2;

    ctx.drawImage(video, x, y, drawW, drawH);
    ctx.drawImage(frameImg, 0, 0, fw, fh);
  });

  // 保存
  saveBtn.addEventListener('click', () => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bonodori_frame.png';
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });
</script>

</body>
</html>
