<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>盆踊りフォトフレーム</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    video, canvas { max-width: 100%; height: auto; }
    button { margin: 10px; padding: 10px 20px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>盆踊りフォトフレーム</h1>

  <!-- カメラ映像 -->
  <video id="video" autoplay playsinline></video><br>
  <button id="shootBtn">写真を撮る</button>
 <button id="switchBtn">カメラ切り替え</button>

  <!-- 合成用キャンバス -->
  <canvas id="canvas"></canvas><br>

  <button id="saveBtn">合成画像を保存</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const shootBtn = document.getElementById('shootBtn');
    const saveBtn = document.getElementById('saveBtn');

    let frameImg = new Image();

    // ★ フレーム画像を自動読み込み（ここが変更点）
    frameImg.src = "frame.png";   // ← HTMLと同じフォルダに置く
    frameImg.onload = () => {
  console.log("frame loaded");
};


    // カメラ起動
   let currentFacing = "environment";  // 初期はバックカメラ

function startCamera() {
  // 既存ストリームを停止
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: currentFacing }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("カメラを起動できません: " + err);
  });
}

// 初回起動
startCamera();

// 切り替えボタン
document.getElementById("switchBtn").addEventListener("click", () => {
  currentFacing = (currentFacing === "user") ? "environment" : "user";
  startCamera();
});

    // 撮影してキャンバスに描画
shootBtn.addEventListener('click', () => {
  const w = video.videoWidth;
  const h = video.videoHeight;
  canvas.width = w;
  canvas.height = h;

  // 写真を描画
  ctx.drawImage(video, 0, 0, w, h);

  // フレーム画像の縦横比を維持して描画
  const fw = frameImg.width;
  const fh = frameImg.height;

  // カメラ映像の高さに合わせて拡大（縦横比維持）
  const scale = h / fh;
  const drawWidth = fw * scale;
  const drawHeight = fh * scale;

  // 中央に配置
  const x = (w - drawWidth) / 2;
  const y = 0;

  ctx.drawImage(frameImg, x, y, drawWidth, drawHeight);
});

    // 合成画像を保存
saveBtn.addEventListener('click', () => {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bonodori_frame.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
});
  </script>
</body>
</html>
