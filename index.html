<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>盆踊りフォトフレーム</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    video, canvas { max-width: 100%; height: auto; }
    button {
  margin: 16px;
  padding: 25px 40px;   /* ← ボタンを大きくする */
  font-size: 30px;      /* ← 文字を大きくする */
  border-radius: 12px;  /* ← 角を丸くして押しやすく */
}
  </style>
</head>
<body>
  <h1>盆踊りフォトフレーム</h1>

  <!-- カメラ映像 -->
  <video id="video" autoplay playsinline></video><br>
  <button id="shootBtn">写真を撮る</button>
 <button id="switchBtn">カメラ切り替え</button>

  <!-- 合成用キャンバス -->
  <canvas id="canvas"></canvas><br>

  <button id="saveBtn">合成画像を保存</button>
<div>
  <button class="frameBtn" data-src="frame1.png">フレーム1</button>
  <button class="frameBtn" data-src="frame3.png">フレーム2</button>

</div>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const shootBtn = document.getElementById('shootBtn');
    const saveBtn = document.getElementById('saveBtn');

    let frameImg = new Image();

    // ★ フレーム画像を自動読み込み（ここが変更点）
    frameImg.src = "frame1.png";   // ← HTMLと同じフォルダに置く
    frameImg.onload = () => {
  console.log("frame loaded");
};
document.querySelectorAll('.frameBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const src = btn.getAttribute('data-src');

    frameImg.onload = () => {
      console.log("frame changed:", src);
      shootBtn.disabled = false;   // ← 読み込み完了で撮影可能にする
    };

    shootBtn.disabled = true;      // ← 読み込み前は押せない
    frameImg.src = src;
  });
});


    // カメラ起動
   let currentFacing = "environment";  // 初期はバックカメラ

function startCamera() {
  // 既存ストリームを停止
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: currentFacing }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("カメラを起動できません: " + err);
  });
}

// 初回起動
startCamera();
// ▼ フレーム切り替え機能
document.querySelectorAll('.frameBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const src = btn.getAttribute('data-src');
    frameImg.src = src;
    console.log("frame changed:", src);
  });
});

// 切り替えボタン
document.getElementById("switchBtn").addEventListener("click", () => {
  currentFacing = (currentFacing === "user") ? "environment" : "user";
  startCamera();
});

    // 撮影してキャンバスに描画
shootBtn.addEventListener('click', () => {
  const fw = frameImg.width;
  const fh = frameImg.height;

  // canvas をフレーム画像のサイズに合わせる（重要）
  canvas.width = fw;
  canvas.height = fh;

  // カメラ映像の縦横比
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const videoRatio = vw / vh;
  const frameRatio = fw / fh;

  let drawW, drawH;

  if (videoRatio > frameRatio) {
    // カメラが横長 → 高さを合わせて幅を拡大（はみ出しOK）
    drawH = fh;
    drawW = fh * videoRatio;
  } else {
    // カメラが縦長 → 幅を合わせて高さを拡大（はみ出しOK）
    drawW = fw;
    drawH = fw / videoRatio;
  }

  // 中央に配置（はみ出し部分は見えない＝トリミング）
  const x = (fw - drawW) / 2;
  const y = (fh - drawH) / 2;

  // カメラ映像を描画（フレームに合わせてトリミング）
  ctx.drawImage(video, x, y, drawW, drawH);

  // フレームを重ねる（絶対に切れない）
  ctx.drawImage(frameImg, 0, 0, fw, fh);
});
    
    // 合成画像を保存
saveBtn.addEventListener('click', () => {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bonodori_frame.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
});
  </script>
</body>
</html>
